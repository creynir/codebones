name: Release Rust

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release Binaries
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            os_name: linux-amd64
          - os: macos-latest
            target: x86_64-apple-darwin
            os_name: macos-amd64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            os_name: windows-amd64

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build CLI and MCP
        run: |
          cargo build --release --bin codebones --target ${{ matrix.target }}
          cargo build --release --bin codebones-mcp --target ${{ matrix.target }}

      - name: Prepare Assets (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mv target/${{ matrix.target }}/release/codebones codebones-${{ matrix.os_name }}
          mv target/${{ matrix.target }}/release/codebones-mcp codebones-mcp-${{ matrix.os_name }}

      - name: Prepare Assets (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          mv target/${{ matrix.target }}/release/codebones.exe codebones-${{ matrix.os_name }}.exe
          mv target/${{ matrix.target }}/release/codebones-mcp.exe codebones-mcp-${{ matrix.os_name }}.exe

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            codebones-*
            codebones-mcp-*

  publish-crates:
    name: Publish to Crates.io
    runs-on: ubuntu-latest
    needs: build-and-release
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish -p codebones-core
          cargo publish -p codebones
          cargo publish -p codebones-mcp
